 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <link rel="stylesheet" href="Game_board.css">
    <script defer src="Game_board.js"></script>
    
 </head>
 
 <body> 

    <div class="game-container">
        <div class="header">
            <div class="scores-wrapper">
                <div class="score-box">
                    <div class="label">ניקוד</div>
                    <div id="current-score">0</div>
                </div>
                <div class="score-box">
                    <div class="label">שיא</div>
                    <div id="best-score">0</div>
                </div>
            </div>
            <div class="score-box">
        <div class="label">זמן משחק</div>
        <div id="game-timer">00:00</div>
    </div>
        </div>
        
        <div class="game-container">
        <h1>2048</h1>
        <div class="board">
    <div id="0"   class="cell" data-value="0"></div>
    <div id="1" class="cell" data-value="0"></div>
    <div id="2" class="cell" data-value="0"></div>
    <div id="3" class="cell" data-value="0"></div>

    <div id="4" class="cell" data-value="0"></div>
    <div id="5" class="cell" data-value="0"></div>
    <div id="6" class="cell" data-value="0"></div>
    <div id="7" class="cell" data-value="0"></div>

    <div id="8" class="cell" data-value="0"></div>
    <div id="9" class="cell" data-value="0"></div>
    <div id="10" class="cell" data-value="0"></div>
    <div id="11" class="cell" data-value="0"></div>
    
    <div id="12" class="cell" data-value="0"></div>
    <div id="13" class="cell" data-value="0"></div>
    <div id="14" class="cell" data-value="0"></div>
    <div id="15" class="cell" data-value="0"></div>
</div>
    </div>

   <button class="restart-btn" onclick="location.reload()">משחק חדש</button>
        <a href="/menu.html" class="btn btn-back">חזור לתפריט</a>
<div id="modal-overlay" class="overlay">
    <div class="modal-card">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2>כל הכבוד! 🏆</h2>
        <div class="stats-container">
            <p>ניקוד סופי: <strong id="final-score">0</strong></p>
            <p>זמן משחק: <strong id="play-time">0</strong> שניות</p>
        </div>
        <button class="retry-btn" onclick="location.reload()">שחק שוב</button>
    </div>
</div>


<div id="win-modal" class="win-overlay">
    <div class="win-card">
        <div class="confetti-icon">🎊</div>
        <h2 class="win-title">ניצחון מוחץ!</h2>
        <hr class="divider">
        <div class="stats-grid">
            <div class="stat-item">
                <span class="stat-label">ניקוד</span>
                <span id="win-score" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">זמן</span>
                <span id="win-time" class="stat-value">0</span>
            </div>
        </div>
        <button class="win-btn" onclick="location.reload()">שיחקת אותה! שוב?</button>
        <span class="close-x" onclick="document.getElementById('win-modal').style.display='none'">&times;</span>
    </div>
</div>
 </body>
 </html>
